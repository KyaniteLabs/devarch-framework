<!DOCTYPE html>
<html lang="en" data-theme="editorial">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Viewer — DevArch</title>
<meta property="og:title" content="Document Viewer — DevArch">
<meta property="og:description" content="Markdown document viewer for DevArch forensic archaeology reports">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26CF;</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=Lora:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js" integrity="sha384-JEyTNhjM6R1ElGoJns4U2Ln4ofPcqzSsynQkmEc/KGy6336qAZl70tDLufbkla+3" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="warm"]{
  --bg-main:     #1f1a14;
  --bg-surface:  #2b241b;
  --bg-card:     #383020;
  --bg-card-alt: #453a28;
  --bg-hover:    #504230;
  --accent:      #d4a017;
  --accent-dim:  rgba(212, 160, 23, 0.12);
  --accent-mid:  rgba(212, 160, 23, 0.25);
  --secondary:   #b87333;
  --secondary-dim: rgba(184, 115, 51, 0.12);
  --success:     #4caf70;
  --success-dim: rgba(76, 175, 112, 0.12);
  --warning:     #e8a830;
  --warning-dim: rgba(232, 168, 48, 0.12);
  --danger:      #c0392b;
  --danger-dim:  rgba(192, 57, 43, 0.12);
  --text:        #f5e8c8;
  --text-2:      #c8b898;
  --text-muted:  #9d8f78;
  --text-faint:  #6b5f4e;
  --border:      rgba(212, 160, 23, 0.15);
  --border-subtle: rgba(255, 255, 255, 0.05);
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', 'Courier New', monospace;
}

[data-theme="editorial"]{
  --bg-main:     #faf9f7;
  --bg-surface:  #ffffff;
  --bg-card:     #ffffff;
  --bg-card-alt: #f5f4f2;
  --bg-hover:    #efeeec;
  --accent:      #1a5c3a;
  --accent-dim:  rgba(26, 92, 58, 0.08);
  --accent-mid:  rgba(26, 92, 58, 0.18);
  --secondary:   #2c5aa0;
  --secondary-dim: rgba(44, 90, 160, 0.08);
  --success:     #1a5c3a;
  --success-dim: rgba(26, 92, 58, 0.08);
  --warning:     #8a6d2b;
  --warning-dim: rgba(138, 109, 43, 0.08);
  --danger:      #a8282d;
  --danger-dim:  rgba(168, 40, 45, 0.08);
  --text:        #1a1a1a;
  --text-2:      #3d3d3d;
  --text-muted:  #6b6b6b;
  --text-faint:  #9d9d9d;
  --border:      rgba(0, 0, 0, 0.10);
  --border-subtle: rgba(0, 0, 0, 0.05);
  --font-display: 'Lora', Georgia, serif;
  --font-body:    'Source Sans 3', system-ui, sans-serif;
  --font-mono:    'IBM Plex Mono', 'Courier New', monospace;
}

[data-theme="modern"]{
  --bg-main:     #09090b;
  --bg-surface:  #0f0f12;
  --bg-card:     #16161a;
  --bg-card-alt: #1c1c21;
  --bg-hover:    #222228;
  --accent:      #3b82f6;
  --accent-dim:  rgba(59, 130, 246, 0.10);
  --accent-mid:  rgba(59, 130, 246, 0.22);
  --secondary:   #8b5cf6;
  --secondary-dim: rgba(139, 92, 246, 0.10);
  --success:     #10b981;
  --success-dim: rgba(16, 185, 129, 0.10);
  --warning:     #f59e0b;
  --warning-dim: rgba(245, 158, 11, 0.10);
  --danger:      #ef4444;
  --danger-dim:  rgba(239, 68, 68, 0.10);
  --text:        #edf0f7;
  --text-2:      #b4bccf;
  --text-muted:  #6b7a9a;
  --text-faint:  #3d4c6a;
  --border:      rgba(255, 255, 255, 0.08);
  --border-subtle: rgba(255, 255, 255, 0.04);
  --font-display: 'Inter', system-ui, sans-serif;
  --font-body:    'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', 'Courier New', monospace;
}

:root{
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --max-width: 1200px;
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.08);
  --shadow-md:  0 4px 12px rgba(0,0,0,0.10);
  --shadow-lg:  0 8px 24px rgba(0,0,0,0.14);
  --transition: 180ms ease;
  --bg: var(--bg-main);
  --surface: var(--bg-surface);
  --surface2: var(--bg-card);
  --text2: var(--text-2);
  --text3: var(--text-muted);
}

.skip-link{
  position:absolute;
  top:-40px;
  left:0;
  background:var(--accent);
  color:var(--bg-main);
  padding:8px 16px;
  text-decoration:none;
  z-index:1000;
  font-family:var(--font-body);
  font-weight:500;
  border-radius:0 0 var(--radius-sm) 0;
}
.skip-link:focus{
  top:0;
}

html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--bg-main);color:var(--text);font-family:var(--font-body);line-height:1.65;min-height:100vh}

.site-nav{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
  padding:0 var(--space-6);
  display:flex;
  align-items:center;
  gap:var(--space-3);
  height:52px;
  font-family:var(--font-display);
  backdrop-filter:blur(12px);
}
.site-nav .nav-home{
  font-weight:700;
  font-size:14px;
  letter-spacing:.02em;
  color:var(--text-muted);
  text-decoration:none;
  padding:4px 10px;
  border-radius:var(--radius-sm);
  transition:color var(--transition),background var(--transition);
}
.site-nav .nav-home:hover{
  color:var(--text);
  background:var(--bg-card);
}
.site-nav .nav-sep{
  width:1px;
  height:24px;
  background:var(--border);
}
.site-nav .nav-title{
  font-weight:600;
  font-size:15px;
  color:var(--text);
  letter-spacing:-.01em;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  flex:1;
}
.site-nav .nav-meta{
  margin-left:auto;
  font-size:11px;
  color:var(--text-muted);
  font-family:var(--font-mono);
}

.theme-switcher{
  display:flex;
  gap:4px;
  margin-left:var(--space-4);
}
.theme-switcher button{
  width:28px;
  height:28px;
  border:1px solid var(--border);
  background:var(--bg-card);
  color:var(--text-muted);
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-family:var(--font-display);
  font-size:12px;
  font-weight:600;
  transition:all var(--transition);
  display:flex;
  align-items:center;
  justify-content:center;
}
.theme-switcher button:hover{
  background:var(--bg-hover);
  color:var(--text);
  border-color:var(--accent);
}
.theme-switcher button.active{
  background:var(--accent);
  color:var(--bg-main);
  border-color:var(--accent);
}
.theme-switcher button:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
}

.container{
  max-width:860px;
  margin:0 auto;
  padding:var(--space-8) var(--space-6) var(--space-16);
}

.loading{
  text-align:center;
  padding:80px var(--space-6);
  color:var(--text-muted);
  font-family:var(--font-mono);
  font-size:14px;
}
.loading::after{
  content:'';
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin-left:8px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

.error{
  background:var(--bg-surface);
  border:1px solid var(--danger-dim);
  border-radius:var(--radius-md);
  padding:var(--space-6);
  text-align:center;
  color:var(--danger);
  font-family:var(--font-mono);
  font-size:13px;
}

.md-body{
  color:var(--text-2);
  line-height:1.8;
}
.md-body h1{
  font-family:var(--font-display);
  font-size:28px;
  font-weight:700;
  color:var(--text);
  margin:32px 0 16px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.md-body h2{
  font-family:var(--font-display);
  font-size:22px;
  font-weight:600;
  color:var(--text);
  margin:28px 0 12px;
}
.md-body h3{
  font-family:var(--font-display);
  font-size:18px;
  font-weight:600;
  color:var(--text);
  margin:24px 0 10px;
}
.md-body h4{
  font-family:var(--font-display);
  font-size:15px;
  font-weight:600;
  color:var(--text);
  margin:20px 0 8px;
}
.md-body p{margin:0 0 16px}
.md-body ul,.md-body ol{margin:0 0 16px;padding-left:24px}
.md-body li{margin:4px 0}
.md-body strong{color:var(--text);font-weight:600}
.md-body a{
  color:var(--accent);
  text-decoration:none;
}
.md-body a:hover{text-decoration:underline}
.md-body a:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
  border-radius:2px;
}
.md-body code{
  font-family:var(--font-mono);
  font-size:0.9em;
  background:var(--bg-card);
  padding:2px 6px;
  border-radius:3px;
  color:var(--accent);
}
.md-body pre{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:16px;
  overflow-x:auto;
  margin:0 0 16px;
}
.md-body pre code{
  background:none;
  padding:0;
  font-size:13px;
  line-height:1.6;
  color:var(--text-2);
}
.md-body blockquote{
  border-left:3px solid var(--accent);
  padding:8px 16px;
  margin:0 0 16px;
  color:var(--text-muted);
  font-style:italic;
}
.md-body table{
  width:100%;
  border-collapse:collapse;
  margin:0 0 16px;
}
.md-body th,.md-body td{
  border:1px solid var(--border);
  padding:8px 12px;
  text-align:left;
  font-size:14px;
}
.md-body th{
  background:var(--bg-surface);
  font-weight:600;
  color:var(--text);
}
.md-body hr{
  border:none;
  border-top:1px solid var(--border);
  margin:24px 0;
}
.md-body img{
  max-width:100%;
  border-radius:var(--radius-sm);
}

@media(max-width:768px){
  .container{padding:var(--space-6) var(--space-4) var(--space-12)}
  .site-nav{padding:0 var(--space-4)}
  .md-body h1{font-size:22px}
  .md-body h2{font-size:18px}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}
</style>
</head>
<body>

<a class="skip-link" href="#content">Skip to content</a>

<nav class="site-nav">
  <a href="/" class="nav-home">Home</a>
  <div class="nav-sep"></div>
  <span class="nav-title" id="nav-title">Loading...</span>
  <span class="nav-meta" id="nav-meta"></span>
  <div class="theme-switcher" role="radiogroup" aria-label="Color theme">
    <button data-theme="warm" aria-label="Warm theme" title="Warm">W</button>
    <button data-theme="editorial" aria-label="Editorial theme" title="Editorial">E</button>
    <button data-theme="modern" aria-label="Modern theme" title="Modern">M</button>
  </div>
</nav>

<main class="container" id="content">
  <div class="loading" id="loading">Loading document</div>
  <div class="md-body" id="content-body" style="display:none"></div>
</main>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var file = params.get('file');
  var titleEl = document.getElementById('nav-title');
  var metaEl = document.getElementById('nav-meta');
  var loadingEl = document.getElementById('loading');
  var contentEl = document.getElementById('content-body');

  if (!file) {
    loadingEl.textContent = 'No file specified. Use ?file=path/to/document.md';
    return;
  }

  var displayName = file.split('/').pop().replace(/[-_]/g, ' ').replace(/\.\w+$/, '');
  titleEl.textContent = displayName;
  document.title = displayName + ' — DevArch';

  var parts = file.split('/');
  var backHref = '/';
  if (parts.length >= 1) backHref = '/' + parts[0] + '/';
  // Build back link safely (avoid HTML injection from URL param)
  var backLink = document.createElement('a');
  backLink.href = backHref;
  backLink.style.cssText = 'color:var(--text-muted);text-decoration:none';
  backLink.textContent = '← back';
  metaEl.appendChild(backLink);

  fetch(file)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      loadingEl.style.display = 'none';
      contentEl.style.display = 'block';
      contentEl.innerHTML = DOMPurify.sanitize(marked.parse(text));
    })
    .catch(function(err) {
      loadingEl.style.display = 'none';
      contentEl.style.display = 'block';
      contentEl.textContent = 'Failed to load: ' + err.message + '\n\nFile: ' + file;
    });
})();

(function() {
  var saved = localStorage.getItem('devarch-theme') || 'editorial';
  document.documentElement.setAttribute('data-theme', saved);
  function updateActive() {
    var current = document.documentElement.getAttribute('data-theme') || 'editorial';
    document.querySelectorAll('.theme-switcher button[data-theme]').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-theme') === current);
    });
  }
  updateActive();
  document.querySelectorAll('.theme-switcher button[data-theme]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var theme = btn.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('devarch-theme', theme);
      updateActive();
    });
  });
})();
</script>
</body>
</html>
